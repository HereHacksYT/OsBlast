<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsBlast - Küpleri Patlat!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="logo">Os<span class="highlight">Blast</span></h1>
            <div class="score-board">Skor: <span id="score">0</span></div>
        </div>

        <!-- 8x8 Oyun Alanı -->
        <div id="board" class="board"></div>

        <!-- Seçilebilir 3 Blok Alanı -->
        <div class="rack" id="rack">
            <div class="rack-slot" id="slot-0"></div>
            <div class="rack-slot" id="slot-1"></div>
            <div class="rack-slot" id="slot-2"></div>
        </div>
    </div>

    <!-- Oyun Bitti Ekranı -->
    <div id="game-over-screen" class="overlay hidden">
        <div class="game-over-box">
            <h2>Oyun Bitti!</h2>
            <p>Toplam Skorun: <span id="final-score">0</span></p>
            <button id="restart-btn">Yeniden Başla</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
